kind: Changed
body: |-
    `bag.insert/3` now returns `Error(KeyAlreadyPresent)` for duplicate key-value pairs

    Previously, inserting an identical key-value pair into a bag table was silently
    ignored. It now returns `Error(KeyAlreadyPresent)` to make the duplicate detection
    explicit and allow callers to handle the case intentionally.
