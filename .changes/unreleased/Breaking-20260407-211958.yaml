kind: Breaking
body: |-
    Hardened DETS error reporting and fold callback behavior before 1.0.

    `slate.DetsError` now exposes `NotADetsFile` and `NeedsRepair` instead of
    routing those known DETS open failures through `UnexpectedError`. The
    `fold` and `fold_results` APIs now re-raise callback exceptions rather than
    wrapping them as DETS errors. `bag.insert_new` is also documented as a
    best-effort duplicate check under concurrent shared access, since DETS does
    not provide an atomic exact-object insert-new operation for bag tables.
time: 2026-04-07T21:19:58.000000+00:00
