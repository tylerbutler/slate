kind: Breaking
body: 'open, open_with, open_with_access, and with_table now require key_decoder and value_decoder parameters (gleam/dynamic/decode Decoder type) to validate data read from disk, ensuring runtime type safety at the DETS-Gleam boundary. A new DecodeErrors variant is added to DetsError for type mismatches.'
