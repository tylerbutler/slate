kind: Changed
body: |-
    `bag.insert/3` now returns `Error(KeyAlreadyPresent)` for duplicate key-value pairs.

    Previously, inserting an identical key-value pair into a bag table was silently
    ignored. It now returns an error so callers can distinguish between a new insert
    and a no-op duplicate.

    **Before:**

    ```gleam
    let assert Ok(Nil) = bag.insert(table, "color", "red")
    let assert Ok(Nil) = bag.insert(table, "color", "red")  // silently ignored
    ```

    **After:**

    ```gleam
    let assert Ok(Nil) = bag.insert(table, "color", "red")
    let assert Error(slate.KeyAlreadyPresent) = bag.insert(table, "color", "red")
    ```

    Inserting a different value for the same key still works as expected:

    ```gleam
    let assert Ok(Nil) = bag.insert(table, "color", "red")
    let assert Ok(Nil) = bag.insert(table, "color", "blue")  // different value, OK
    ```
