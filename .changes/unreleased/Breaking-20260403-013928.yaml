kind: Breaking
body: |-
    Refined the public error API for DETS operations.

    `ErlangError(detail)` was replaced with `UnexpectedError(detail)` to make
    it explicit that the payload is diagnostic-only, and `update_counter` now
    returns `CounterValueNotInteger` instead of a raw Erlang error string. The
    top-level `slate` module also now provides `error_code` and
    `error_message` helpers for stable error handling.
