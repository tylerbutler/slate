kind: Breaking
body: |-
    Refined the public error API for DETS operations.

    `ErlangError(detail)` was replaced with `UnexpectedError(detail)` to make
    it explicit that the payload is diagnostic-only. `slate/set.update_counter`
    now returns a dedicated `UpdateCounterError`, with shared DETS failures
    wrapped as `TableError(slate.DetsError)` and the non-integer case surfaced
    as `CounterValueNotInteger`. The top-level `slate` module also now provides
    `error_code` and `error_message` helpers for stable `DetsError` handling.
time: 2026-04-03T01:39:28.000000+00:00
