name = "dotes"
version = "0.1.0"
description = "A simple note-taking CLI built with slate — demonstrates the full slate API"
licences = ["MIT"]
target = "erlang"

[dependencies]
slate = { path = "../.." }
gleam_stdlib = ">= 0.48.0 and < 2.0.0"
gleam_erlang = ">= 1.0.0 and < 2.0.0"
gleam_time = ">= 1.0.0 and < 2.0.0"
simplifile = ">= 2.0.0 and < 3.0.0"
argv = ">= 1.0.0 and < 3.0.0"
shore = ">= 1.3.0 and < 2.0.0"
lustre = ">= 5.6.0 and < 6.0.0"
mist = ">= 6.0.0 and < 7.0.0"
gleam_http = ">= 4.0.0 and < 5.0.0"
gleam_json = ">= 3.0.0 and < 4.0.0"
